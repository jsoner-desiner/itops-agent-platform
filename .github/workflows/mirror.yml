name: Mirror to Gitee & Gitcode

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror Code
    runs-on: ubuntu-latest
    if: github.repository == 'qinshihu/itops-agent-platform'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config --global user.name "qinshihu"
          git config --global user.email "huawei_network@foxmail.com"

      - name: Add Gitee Remote
        run: |
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_PASSWORD }}@gitee.com/IT_Oline/itops-agent-platform.git || true

      - name: Add Gitcode Remote
        run: |
          git remote add gitcode https://${{ secrets.GITCODE_USERNAME }}:${{ secrets.GITCODE_TOKEN }}@gitcode.com/gcw_IM7aAihp/itops-agent-platform.git || true

      - name: Push to Gitee
        run: |
          git push gitee --all --force || true
          git push gitee --tags --force || true

      - name: Push to Gitcode
        run: |
          git push gitcode --all --force || true
          git push gitcode --tags --force || true
