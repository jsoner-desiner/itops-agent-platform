name: Documentation Update
description: 建议更新或改进文档
title: "[Docs]: "
labels: ["documentation"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢你对文档的关注！请描述需要更新或改进的文档内容。

  - type: dropdown
    id: doc-type
    attributes:
      label: 文档类型
      description: 请选择需要更新的文档类型
      options:
        - README.md
        - 部署文档
        - 开发指南
        - API 文档
        - 架构文档
        - 功能使用文档
        - 故障排查文档
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 文档问题描述
      description: 请描述文档中存在的问题或需要改进的地方
      placeholder: 描述文档问题...
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: 改进建议
      description: 你有什么具体的改进建议？
      placeholder: 描述你的改进建议...
    validations:
      required: false
