name: Feature Request
description: 提出一个新功能建议
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请详细描述你想要的功能，帮助我理解你的需求。

  - type: dropdown
    id: module
    attributes:
      label: 功能所属模块
      description: 请选择功能所属的模块
      options:
        - 仪表盘
        - 服务器管理
        - Agent 管理
        - 工作流编排
        - 告警中心
        - Web SSH 终端
        - 知识库
        - AI Copilot
        - 定时任务
        - 自动修复
        - 根因分析
        - 通知系统
        - 备份恢复
        - 导入导出
        - 网络管理
        - 变更管理
        - AI 模型管理
        - 其他（全新模块）
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 这个功能想解决什么问题？
      placeholder: 请描述你遇到的问题或需求...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望如何实现这个功能？
      placeholder: 请描述你期望的解决方案...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？
      placeholder: 描述其他可能的实现方式...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他有助于理解需求的信息
      placeholder: 补充信息...
    validations:
      required: false
